<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkBot | AI Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blur"></div>
    
    <div class="profile-container">
        <header class="profile-header">
            <div class="bot-identity">
                <div class="avatar-glow">🤖</div>
                <div class="id-text">
                    <h1>TalkBot <span>v2.0</span></h1>
                    <p>Your Guided AI Mentor</p>
                </div>
            </div>
            <div class="status-badge">Online</div>
        </header>

        <main class="chat-portal" id="chatDisplay">
            </main>

        <footer class="action-center">
            <p class="instruction">Select a learning path:</p>
            <div class="options-grid" id="optionsArea">
                </div>
            <button class="restart-link" onclick="resetChat()">Restart Journey</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
