<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkBot | AI Learning Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blob"></div>

    <div class="dashboard">
        <aside class="side-panel">
            <div class="glass-card">
                <div class="card-title">🎮 Speed Quiz</div>
                <div class="game-box">
                    <p id="q-text" style="font-size: 0.9rem; min-height: 45px; font-weight: 600;">Loading...</p>
                    <div class="quiz-controls" id="quiz-controls">
                        <button class="choice-btn quiz-opt" onclick="playGame(false)">❌ False</button>
                        <button class="choice-btn quiz-opt" onclick="playGame(true)">✅ True</button>
                    </div>
                    <p id="q-feedback" style="font-size: 0.8rem; margin-top: 12px; font-weight: 800;"></p>
                </div>
            </div>

            <div class="glass-card">
                <div class="card-title">💡 Things to Ask</div>
                <div class="suggested-box">
                    <button class="suggest-item" onclick="askSuggested('What is AI?')">❓ What is AI?</button>
                    <button class="suggest-item" onclick="askSuggested('How does AI learn?')">❓ How does AI learn?</button>
                    <button class="suggest-item" onclick="askSuggested('What are Prompt rules?')">❓ Prompt rules?</button>
                    <button class="suggest-item" onclick="askSuggested('Is AI always right?')">❓ Is AI always right?</button>
                </div>
            </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="avatar-glow">🤖</div>
                    <div>
                        <strong style="font-size: 1rem; display: block;">TalkBot Console</strong>
                        <span style="font-size: 0.7rem; color: var(--success); font-weight: 700;">● SYSTEM ACTIVE</span>
                    </div>
                </div>
                <button onclick="resetChat()" class="restart-link">Reset Session</button>
            </header>

            <div class="chat-portal" id="chatDisplay"></div>
            <div class="input-bar">
                <input type="text" id="userInput" placeholder="Type one of the questions on the left...">
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </main>

        <aside class="side-panel">
            <div class="glass-card wiki-card" onclick="openWiki('hallucination')">
                <div class="card-title">📖 Hallucination</div>
                <p style="font-size: 0.75rem;">Confidence vs. Accuracy.</p>
            </div>
            <div class="glass-card wiki-card" onclick="openWiki('spec')">
                <div class="card-title">✍️ S.P.E.C. Rule</div>
                <p style="font-size: 0.75rem;">Formula for prompts.</p>
            </div>
            <div class="glass-card wiki-card" onclick="openWiki('ethics')">
                <div class="card-title">🛡️ Ethics</div>
                <p style="font-size: 0.75rem;">Co-pilot, not pilot.</p>
            </div>
        </aside>
    </div>

    <div id="wikiOverlay" class="wiki-overlay">
        <div class="overlay-content">
            <button class="close-btn" onclick="closeWiki()">× Back</button>
            <div id="wikiBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
