<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkBot | Your Pink AI Tutor ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="bg-circle one"></div>
    <div class="bg-circle two"></div>

    <nav>
        <div class="logo">TalkBot<span>.pink</span></div>
        <ul>
            <li><a href="#" onclick="showSection('home')">Home</a></li>
            <li><a href="#" onclick="showSection('chat')">Start Learning</a></li>
        </ul>
    </nav>

    <section id="home" class="active">
        <div class="hero">
            <div class="hero-icon">🤖💖</div>
            <h1>Master ChatGPT with Fun!</h1>
            <p>Welcome to the Pink Learning Zone! 🌸 Instead of typing long questions, follow our <b>guided paths</b> to become an AI expert in minutes.</p>
            <button class="btn-main" onclick="startLearning()">Start My Journey ✨</button>
            
            <div class="features-preview">
                <span>✓ ChatGPT Secrets</span>
                <span>✓ Prompt Games</span>
                <span>✓ Safety Tips</span>
            </div>
        </div>
    </section>

    <section id="chat">
        <div class="chat-wrapper">
            <div class="chat-header">
                <div class="status-dot"></div>
                <span>TalkBot is online!</span>
            </div>
            
            <div class="chat-display" id="chatDisplay">
                </div>

            <div class="options-area" id="optionsArea">
                </div>

            <div class="controls">
                <button class="btn-restart" onclick="resetChat()">🔄 Reset Conversation</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
